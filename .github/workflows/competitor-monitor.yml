name: Weekly Competitor Monitor

on:
  schedule:
    - cron: '0 2 * * 1'  # UTC 02:00 每週一 = 台灣時間週一 10:00
  workflow_dispatch:       # 允許手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Competitor Monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          # 必填：設定你要監控的競品（逗號分隔）
          # 範例：COMPETITOR_NAMES: "Notion,Airtable,Monday.com"
          COMPETITOR_NAMES: ${{ secrets.COMPETITOR_NAMES }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL || 'claude-haiku-3-5' }}
        run: python scripts/competitor_monitor.py
