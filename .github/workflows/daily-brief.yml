name: Daily AI Brief

on:
  schedule:
    - cron: '50 23 * * *'  # UTC 23:50 = 台灣時間 07:50
  workflow_dispatch:        # 允許手動觸發（方便測試）

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Daily Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 選用：指定 Claude 模型（預設 claude-haiku-3-5 最省錢）
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL || 'claude-haiku-3-5' }}
          # 選用：自訂早報主題（逗號分隔）
          # BRIEF_TOPICS: "AI 新聞,科技產業,台灣商業"
        run: python scripts/daily_brief.py
