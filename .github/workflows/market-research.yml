name: Daily Market Research

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 台灣時間 09:00，每天執行
  workflow_dispatch:       # 允許手動觸發

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Market Research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          # 選用：自訂研究關鍵字（逗號分隔）
          # RESEARCH_KEYWORDS: "AI automation,no-code tools,SaaS market"
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL || 'claude-haiku-3-5' }}
        run: python scripts/market_research.py
